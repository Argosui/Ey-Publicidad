<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro — Ey! Publicidad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles/register.css">
</head>

<body>

  <div class="register-page">

    <!-- Panel izquierdo / decorativo -->
    <div class="register-brand">
      <div class="brand-inner">
        <img src="/assets/logo/ey-black-removebg-preview.png" alt="Ey! Publicidad" class="brand-logo" />
        <p class="brand-tagline">Tu marca,<br><em>en todas partes.</em></p>
        <ul class="brand-perks">
          <li><span class="perk-dot"></span> Acceso a inventario exclusivo</li>
          <li><span class="perk-dot"></span> Tarifas y disponibilidad en tiempo real</li>
          <li><span class="perk-dot"></span> Gestión de campañas desde tu cuenta</li>
        </ul>
        <div class="brand-dots">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>
      <div class="brand-overlay"></div>
    </div>

    <!-- Panel derecho / formulario -->
    <div class="register-container">
      <div class="register-card">

        <span class="register-tag">Nuevo usuario</span>
        <h2>Crear cuenta</h2>
        <p class="register-sub">Completa tus datos para comenzar</p>

        <form id="registerForm">

          <div class="form-row">
            <div class="input-group">
              <label for="name">Nombre completo</label>
              <div class="input-wrap">
                <span class="input-icon">👤</span>
                <input type="text" id="name" placeholder="Tu nombre" required>
              </div>
            </div>

            <div class="input-group">
              <label for="code">Código</label>
              <div class="input-wrap">
                <span class="input-icon">#</span>
                <input type="number" id="code" placeholder="000000" required>
              </div>
            </div>
          </div>

          <div class="input-group">
            <label for="email">Correo electrónico</label>
            <div class="input-wrap">
              <span class="input-icon">✉</span>
              <input type="email" id="email" placeholder="tucorreo@ejemplo.com" required>
            </div>
          </div>

          <div class="form-row">
            <div class="input-group">
              <label for="password">Contraseña</label>
              <div class="input-wrap">
                <span class="input-icon">🔒</span>
                <input type="password" id="password" placeholder="••••••••" required>
                <button type="button" class="toggle-pass" data-target="password" aria-label="Mostrar contraseña">👁</button>
              </div>
            </div>

            <div class="input-group">
              <label for="confirmPassword">Confirmar contraseña</label>
              <div class="input-wrap">
                <span class="input-icon">🔒</span>
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
                <button type="button" class="toggle-pass" data-target="confirmPassword" aria-label="Mostrar contraseña">👁</button>
              </div>
            </div>
          </div>

          <!-- Indicador de fuerza de contraseña -->
          <div class="password-strength" id="strengthBar">
            <div class="strength-track">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <span class="strength-label" id="strengthLabel"></span>
          </div>

          <button type="submit" class="btn-submit">Registrarse</button>

        </form>

        <div class="extra">
          ¿Ya tienes cuenta? <a href="../login/index.html">Inicia sesión</a>
        </div>

      </div>
    </div>
  </div>

  <script>
    // Toggle password visibility
    document.querySelectorAll('.toggle-pass').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        input.type = input.type === 'password' ? 'text' : 'password';
      });
    });

    // Focus labels
    document.querySelectorAll('.input-wrap input').forEach(input => {
      input.addEventListener('focus', () => input.closest('.input-group').classList.add('focused'));
      input.addEventListener('blur',  () => input.closest('.input-group').classList.remove('focused'));
    });

    // Password strength
    const pwInput    = document.getElementById('password');
    const fillEl     = document.getElementById('strengthFill');
    const labelEl    = document.getElementById('strengthLabel');
    const barWrapper = document.getElementById('strengthBar');

    const levels = [
      { label: 'Muy débil',  color: '#e50914', width: '20%'  },
      { label: 'Débil',      color: '#ff6b35', width: '40%'  },
      { label: 'Regular',    color: '#f5a623', width: '60%'  },
      { label: 'Fuerte',     color: '#7ed321', width: '80%'  },
      { label: 'Muy fuerte', color: '#4caf50', width: '100%' },
    ];

    pwInput.addEventListener('input', () => {
      const val = pwInput.value;
      if (!val) { barWrapper.classList.remove('visible'); return; }
      barWrapper.classList.add('visible');

      let score = 0;
      if (val.length >= 8)          score++;
      if (/[A-Z]/.test(val))        score++;
      if (/[0-9]/.test(val))        score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      if (val.length >= 12)         score++;

      const lvl = levels[Math.min(score, 4)];
      fillEl.style.width       = lvl.width;
      fillEl.style.background  = lvl.color;
      labelEl.textContent      = lvl.label;
      labelEl.style.color      = lvl.color;
    });

 
    const confirmInput = document.getElementById('confirmPassword');
    confirmInput.addEventListener('input', () => {
      const group = confirmInput.closest('.input-group');
      if (confirmInput.value && confirmInput.value !== pwInput.value) {
        group.classList.add('error');
      } else {
        group.classList.remove('error');
      }
    });
  </script>

</body>
</html>
